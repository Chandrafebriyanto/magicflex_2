<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MagicFlex - Master CSS Flexbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="MagicFlex is an interactive game designed to teach CSS Flexbox concepts through engaging space-themed missions."
    />
    <meta
      name="keywords"
      content="CSS, MagicFlex, game, interactive, learning, space, web development, educational"
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&amp;family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- SweetAlert2 CDN - Primary -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
    <!-- SweetAlert2 Script -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    
    <!-- Externalized Tailwind Configuration -->
    <script src="js/tailwind-config.js"></script>

    <style>
      /* Mobile-specific overrides for game page */
      @media (max-width: 767px) {
        body { overflow: auto !important; height: auto !important; min-height: 100vh; }
        .game-main { flex-direction: column-reverse !important; height: auto !important; overflow: visible !important; }
        .game-sidebar {
          width: 100% !important;
          min-width: 100% !important;
          max-height: none !important;
          height: auto !important;
          min-height: auto !important;
          border-right: none !important;
          border-bottom: 1px solid rgba(148,142,161,0.2) !important;
        }
        .game-workspace {
          min-height: 60vw !important;
          height: auto !important;
          padding: 12px !important;
        }
        .game-workspace .board-wrapper {
          max-width: 80vw !important;
          width: 80vw !important;
        }
      }
      /* Smooth level transition */
      #instructions {
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      #instructions.level-fade-out {
        opacity: 0;
        transform: translateY(8px);
      }
    </style>
  </head>
  <body class="text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- TopNav - Desktop -->
    <nav class="hidden md:flex justify-between items-center px-margin-desktop py-2 w-full bg-surface dark:bg-surface border-b border-outline-variant shadow-md z-50">
      <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-secondary text-3xl">auto_awesome</span>
        <span class="font-headline-lg text-headline-lg font-bold text-secondary-container dark:text-secondary">MagicFlex</span>
      </div>
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 glass-panel px-4 py-2 rounded-full border border-secondary-container/30">
          <span class="material-symbols-outlined text-secondary">hourglass_empty</span>
          <span class="font-body-md text-on-surface font-bold timer-display" id="timer">30:00</span>
        </div>
        <a href="index.html" class="flex items-center gap-2 bg-surface-bright/50 hover:bg-surface-variant hover:-translate-y-0.5 transition-all duration-300 px-4 py-2 rounded-full border border-outline-variant/30 text-sm font-semibold">
          <span class="material-symbols-outlined text-sm">home</span>
          Kembali ke Beranda
        </a>
      </div>
    </nav>

    <!-- TopNav - Mobile -->
    <nav class="flex md:hidden justify-between items-center px-4 py-3 w-full bg-surface border-b border-outline-variant shadow-md z-50">
      <a href="index.html" class="flex items-center gap-1 text-on-surface-variant hover:text-secondary transition-colors">
        <span class="material-symbols-outlined text-xl">arrow_back</span>
      </a>
      <span class="font-headline-lg text-lg font-bold text-secondary">MagicFlex</span>
      <div class="flex items-center gap-1 glass-panel px-3 py-1.5 rounded-full border border-secondary-container/30">
        <span class="material-symbols-outlined text-secondary text-sm">hourglass_empty</span>
        <span class="font-body-md text-on-surface font-bold text-xs timer-display" id="timer-mobile">30:00</span>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="game-main flex flex-1 flex-col md:flex-row overflow-hidden relative">
      <!-- Left Sidebar (Wood Texture) -->
      <div class="game-sidebar w-full md:w-[450px] md:min-w-[380px] wood-texture p-4 md:p-6 flex flex-col h-auto md:h-full border-r border-outline-variant/30 shadow-2xl z-20 gap-4 md:gap-6 overflow-y-auto">
        <!-- Level Selection -->
        <div class="flex flex-col border-b border-outline-variant/30 pb-4">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-headline-lg text-sm text-secondary uppercase tracking-widest">Levels</h3>
            <div class="flex items-center gap-2">
              <button class="arrow left text-secondary hover:text-white font-bold" id="prevBtn">‹</button>
              <span class="text-xs text-on-surface-variant font-bold" id="level-indicator">
                Mission <span class="current">1</span> of <span class="total">25</span>
              </span>
              <button class="arrow right text-secondary hover:text-white font-bold" id="nextBtn">›</button>
            </div>
          </div>
          <!-- Progress dots will be generated here -->
          <div class="grid grid-cols-6 gap-2" id="progressGrid">
          </div>
        </div>

        <!-- Instructions -->
        <div class="flex flex-col border-b border-outline-variant/30 pb-4 h-auto flex-shrink-0">
          <h3 class="font-headline-lg text-lg text-secondary mb-3 flex items-center justify-between">
            <span id="level-counter">Mission <span class="current">1</span></span>
          </h3>
          <div class="text-on-surface-variant font-body-md space-y-4 text-sm" id="instructions">
            <!-- instructions html goes here -->
          </div>
        </div>

        <!-- Editor -->
        <div class="glass-panel rounded-xl p-4 md:p-5 flex flex-col font-mono text-lg h-content">
          <div class="flex justify-between items-center mb-4 border-b border-outline-variant/50 pb-2">
            <span class="text-secondary font-bold text-sm tracking-widest uppercase">Grimoire Editor</span>
            <div class="flex items-center gap-3">
              <button class="bg-surface-bright hover:bg-surface-container-highest text-on-surface px-3 py-1.5 rounded-lg font-bold transition-all text-xs border border-outline-variant/50" id="labelReset">Reset</button>
              <button class="bg-primary-container text-on-primary-container px-5 py-1.5 rounded-lg font-bold hover:bg-primary transition-all shadow-lg text-xs border border-primary/30" id="next">Cast Spell</button>
            </div>
          </div>
          <div class="flex-1 relative overflow-y-auto text-sm">
            <div class="pl-2 text-on-surface">
              <pre id="before" class="text-on-surface-variant"></pre>
              <textarea
                id="code"
                autofocus
                autocapitalize="none"
                spellcheck="false"
                class="code-input w-full rounded px-2 py-1 text-sm font-mono mt-1"
                placeholder="type spell here..."
              ></textarea>
              <pre id="after" class="text-on-surface-variant"></pre>
            </div>
          </div>
        </div>

        <!-- Next Level / Finish Button -->
        <button id="nextLevelBtn" class="w-full mt-2 flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-sm tracking-wide uppercase transition-all duration-300 border border-secondary-container/40 bg-gradient-to-r from-primary-container/80 to-primary-container text-on-primary-container hover:from-primary hover:to-primary hover:text-on-primary hover:shadow-[0_0_25px_rgba(125,78,250,0.5)] hover:-translate-y-0.5 active:scale-[0.98]">
          <span class="material-symbols-outlined text-lg" id="nextLevelIcon">arrow_forward</span>
          <span id="nextLevelText">Lanjut Soal Berikutnya</span>
        </button>
      </div>

      <!-- Right Workspace Area -->
      <div class="game-workspace flex-1 relative bg-[#1c1427] overflow-hidden flex items-center justify-center p-3 md:p-6 lg:p-12">
        <!-- Background Image (Mystical Archive Style) -->
        <img alt="" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-screen" src="images/bg.png">
        <!-- Game Canvas Overlay Wrapper to keep it square and responsive -->
        <div class="board-wrapper w-full max-w-[min(100%,calc(100vh-160px))] aspect-square relative" style="aspect-ratio: 1/1;">
          <div class="glass-panel w-full h-full rounded-xl relative overflow-hidden" id="board">
            <!-- Pond: area where flex items (aliens, etc.) are displayed -->
            <div class="pond" id="pond"></div>
            <!-- Background: decorative or contextual background for the game area -->
            <div class="background" id="background"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Background Space Particles (Optional but nice) -->
    <div class="space-background hidden"></div>
    <div class="particles" id="particles"></div>

    <script src="js/levels.js"></script>
    <script src="js/docs.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
